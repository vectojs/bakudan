<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bakudan — Danmaku Playground</title>
    <meta
      name="description"
      content="Canvas-native danmaku playground — 5,000 concurrent barrage entities at 60fps on VectoJS."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bakudan" />
    <meta property="og:title" content="Bakudan — Danmaku Playground" />
    <meta
      property="og:description"
      content="Canvas-native danmaku playground — 5,000 concurrent barrage entities at 60fps on VectoJS."
    />
    <meta property="og:url" content="https://bakudan.vectojs.org/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Bakudan — Danmaku Playground" />
    <meta
      name="twitter:description"
      content="Canvas-native danmaku playground — 5,000 concurrent barrage entities at 60fps on VectoJS."
    />
    <style>
      :root {
        --bg-color: #0f1420;
        --text-color: #e2e8f0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
      }
      /* Layer stack (bottom → top):
         - #bakudan-bg (z0): ambient gradient / <video> background
         - Scene's stacked WebGL canvas (z1, set in main.ts): plain danmaku glyphs
         - #bakudan-canvas (z2): Canvas2D special-pass danmaku + HUD/panel UI
         The danmaku must sit ABOVE the background but BELOW the UI, which is why
         the background can't share the 2D canvas — it moves to its own DOM layer. */
      #bakudan-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        overflow: hidden;
      }
      #bakudan-bg.ambient {
        background: linear-gradient(135deg, #faf8f6 0%, #fdf6f0 45%, #fdf6f0 70%, #fef0e8 100%);
      }
      #bakudan-bg > video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
      }
      #bakudan-canvas {
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="bakudan-bg" class="ambient"></div>
    <canvas id="bakudan-canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
