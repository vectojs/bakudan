name: Feature request
description: Propose a danmaku interaction or workflow.
title: 'feat: '
labels: ['enhancement']
body:
  - type: textarea
    id: intent
    attributes:
      label: User intent
      description: Describe the danmaku task and why the current interaction cannot complete it.
    validations:
      required: true
  - type: textarea
    id: interaction
    attributes:
      label: Pointer, keyboard, and accessibility contract
      description: Describe expected mouse/touch/keyboard behavior, focus, semantics, and responsive states.
    validations:
      required: true
  - type: textarea
    id: model
    attributes:
      label: Core model impact
      description: Identify any pure model operation that belongs in `src/model/` rather than the canvas adapter.
